<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="login-box">
        <div class="heading-box">
            <h3>Back to your digital life</h3>
            <p>choose one option to go</p>
        </div>

        <form action="index.html">
            <div class="inputs">
                <input type="email" placeholder="Enter your E-mail" required>
                <input type="password" placeholder="Enter the password" required>
            </div>

            <div class="login-link-container">
                <p class="or">Or cantinue with</p>

                <div class="login-options">
                    <div class="img">
                        <img src="/images/google.png" alt="google">
                    </div>
                    <div class="img">
                        <img src="/images/meta.png" alt="meta">
                    </div>
                    <div class="img">
                        <img src="/images/apple-logo.png" alt="apple">
                    </div>
                </div>

            </div>
            <button type="submit">Login</button>

        <h6 id="id">I don't have an account. Click here</h6>
        <a href="/register.html">Register</a>

        </form>
    </div>
</body>
</html>
